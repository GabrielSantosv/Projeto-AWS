spring:
  datasource:
    url: jdbc:h2:mem:pedido_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false

aws:
  endpoint: http://localhost:4566
  region: us-east-1
  sns:
    saga-topic-arn: arn:aws:sns:us-east-1:000000000000:saga-events-topic
  sqs:
    pedido-queue-url: http://localhost:4566/000000000000/pedido-service-queue
    poll-interval-ms: 2000

outbox:
  poll-interval-ms: 100
  batch-size: 10
